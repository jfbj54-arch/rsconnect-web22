<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Connect</title>

    <!-- Manifest para ativar instalação -->
    <link rel="manifest" href="manifest.json">

    <!-- Ícones -->
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <meta name="theme-color" content="#0ea5e9">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0ea5e9, #0369a1);
            animation: gradientMove 8s infinite alternate;
        }

        @keyframes gradientMove {
            0% { background: linear-gradient(135deg, #0ea5e9, #0369a1); }
            100% { background: linear-gradient(135deg, #0824c7, #0c4a6e); }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            color: white;
            width: 90%;
            max-width: 400px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #0ea5e9;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0369a1;
        }

        #installBtn {
            display: none;
            background-color: #22c55e;
        }

        #installBtn:hover {
            background-color: #15803d;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>RS Connect</h1>
        <p>Serviços profissionais sob demanda</p>

        <!-- BOTÃO DE INSTALAR APP -->
        <button id="installBtn">Instalar App</button>

        <!-- BOTÃO DE ENTRAR -->
        <button onclick="entrar()">Entrar no Sistema</button>
    </div>

    <script>
        function entrar() {
            window.location.href = "login.html";
        }

        // Registrar Service Worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
        }

        // Lógica do botão de instalar
        let deferredPrompt;
        const installBtn = document.getElementById("installBtn");

        window.addEventListener("beforeinstallprompt", (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = "block"; // MOSTRA O BOTÃO
        });

        installBtn.addEventListener("click", async () => {
            installBtn.style.display = "none";
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const choice = await deferredPrompt.userChoice;
                deferredPrompt = null;
            }
        });
    </script>

</body>
</html>
