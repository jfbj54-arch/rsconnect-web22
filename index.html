<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>RS Connect</title>

  <meta name="theme-color" content="#0ea5e9" />
  <link rel="manifest" href="manifest.json" />

  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />

  <style>
    body {
      margin: 0;
      background: #020617;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 16px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #0ea5e9;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0f8ff;
      font-weight: bold;
      font-size: 18px;
    }

    main {
      padding: 20px;
    }

    .card {
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 20px;
      max-width: 480px;
      margin: auto;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.8);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: #0b1120;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo-icon">RS</div>
    <h2>RS Connect</h2>
  </header>

  <main>
    <div class="card">
      <h1>Bem-vindo ao RS Connect</h1>
      <p>Gerencie serviços, clientes e veículos com facilidade.</p>

      <button class="btn" id="installBtn" style="display:none;">
        Instalar RS Connect
      </button>
    </div>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      deferredPrompt.prompt();
      deferredPrompt = null;
      installBtn.style.display = 'none';
    });
  </script>
</body>
</html>
