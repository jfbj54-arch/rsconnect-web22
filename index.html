<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Connect</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#0ea5e9">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0ea5e9, #0369a1, #0824c7);
            background-size: 300% 300%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            width: 90%;
            max-width: 380px;
            padding: 40px 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            color: white;
        }

        .logo {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            margin-bottom: 20px;
            background: url("icon-192.png") center/cover no-repeat;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }

        p {
            margin: 10px 0 25px;
            font-size: 16px;
            opacity: 0.9;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.25s;
            color: white;
            font-weight: 600;
        }

        #installBtn {
            background-color: #22c55e;
            display: none;
        }

        #installBtn:hover {
            background-color: #15803d;
        }

        #enterBtn {
            background-color: #0ea5e9;
            display: none;
        }

        #enterBtn:hover {
            background-color: #0369a1;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo"></div>

        <h1>RS Connect</h1>
        <p>Serviços profissionais sob demanda</p>

        <button id="installBtn">Instalar Aplicativo</button>
        <button id="enterBtn" onclick="entrar()">Entrar no Sistema</button>
    </div>

    <script>
        function entrar() {
            window.location.href = "login.html";
        }

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
        }

        let deferredPrompt;
        const installBtn = document.getElementById("installBtn");
        const enterBtn = document.getElementById("enterBtn");

        const isInstalled =
            window.matchMedia('(display-mode: standalone)').matches ||
            navigator.standalone === true;

        if (isInstalled) {
            enterBtn.style.display = "block";
        }

        window.addEventListener("beforeinstallprompt", (e) => {
            if (!isInstalled) {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.style.display = "block";
            }
        });

        installBtn.addEventListener("click", async () => {
            installBtn.style.display = "none";
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                enterBtn.style.display = "block";
            }
        });
    </script>

</body>
</html>
