<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Connect</title>

    <!-- Manifest para PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- Ícones -->
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <meta name="theme-color" content="#0ea5e9">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0ea5e9, #0369a1);
            animation: gradientMove 8s infinite alternate;
        }

        @keyframes gradientMove {
            0% { background: linear-gradient(135deg, #0ea5e9, #0369a1); }
            100% { background: linear-gradient(135deg, #0824c7, #0c4a6e); }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            color: white;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            margin-bottom: 30px;
            font-size: 16px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #0ea5e9;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0369a1;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>RS Connect</h1>
        <p>Serviços profissionais sob demanda</p>
        <button onclick="entrar()">Entrar no Sistema</button>
    </div>

    <script>
        function entrar() {
            window.location.href = "login.html";
        }

        // Registrar o Service Worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .then(() => console.log("Service Worker registrado"))
                .catch(err => console.log("Erro ao registrar SW:", err));
        }
    </script>

</body>
</html>
